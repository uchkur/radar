# Radar на Apple Silicon (M1/M2/M3): Oracle Database 23 Free — нативный arm64.
# Oracle XE 11 под Rosetta даёт ORA-00443 (PMON) — на M2 используй этот файл.
#
# Выбирается автоматически в scripts/start-stack.sh на Darwin arm64.

networks:
  radar:
    driver: bridge

x-oracle: &oracle
  image: gvenzl/oracle-free:23-slim
  shm_size: "2gb"
  cpus: 2
  environment:
    ORACLE_PASSWORD: test
  healthcheck:
    test: ["CMD", "healthcheck.sh"]
    interval: 15s
    timeout: 60s
    retries: 30
    start_period: 600s

services:
  oracle-wdc:
    <<: *oracle
    container_name: oracle-wdc
    networks: [radar]
    ports:
      - "1521:1521"
    volumes:
      - oracle-wdc-volume:/opt/oracle/oradata
    restart: unless-stopped

  oracle-cdc:
    <<: *oracle
    container_name: oracle-cdc
    networks: [radar]
    ports:
      - "1522:1521"
    volumes:
      - oracle-cdc-volume:/opt/oracle/oradata
    depends_on:
      oracle-wdc:
        condition: service_healthy
    restart: unless-stopped

  exporter-wdc:
    image: ghcr.io/iamseth/oracledb_exporter:0.6.0
    container_name: radar-exporter-wdc
    networks: [radar]
    command: ["--custom.metrics", "/metrics/custom-metrics.toml"]
    environment:
      DATA_SOURCE_NAME: oracle://monitor:monitor@oracle-wdc:1521/FREEPDB1
    volumes:
      - ../oracle/custom-metrics.toml:/metrics/custom-metrics.toml:ro
    ports:
      - "9161:9161"
    depends_on:
      oracle-wdc:
        condition: service_started
    restart: unless-stopped

  exporter-cdc:
    image: ghcr.io/iamseth/oracledb_exporter:0.6.0
    container_name: radar-exporter-cdc
    networks: [radar]
    command: ["--custom.metrics", "/metrics/custom-metrics.toml"]
    environment:
      DATA_SOURCE_NAME: oracle://monitor:monitor@oracle-cdc:1521/FREEPDB1
    volumes:
      - ../oracle/custom-metrics-cdc.toml:/metrics/custom-metrics.toml:ro
    ports:
      - "9162:9161"
    depends_on:
      oracle-cdc:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: radar-prometheus
    networks: [radar]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.6.1
    container_name: radar-alloy
    networks: [radar]
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      - prometheus
      - exporter-wdc
      - exporter-cdc
    restart: unless-stopped

volumes:
  oracle-wdc-volume:
  oracle-cdc-volume:
  prometheus-data:
  alloy-data:
