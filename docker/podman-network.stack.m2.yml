# Radar на Apple Silicon: один Oracle 23 Free (arm64).
# ORA-01078 / LRM-00109 → битый volume (прерванная инициализация). См. reset-oracle-volumes.sh

networks:
  radar:
    driver: bridge

services:
  oracle-wdc:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-wdc
    networks: [radar]
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: test
    volumes:
      - oracle-wdc-volume:/opt/oracle/oradata
    shm_size: "2gb"
    cpus: 2
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 60s
      retries: 40
      start_period: 900s
    # не перезапускать на битом volume — иначе LRM-00109 в цикле
    restart: on-failure:2

  exporter-wdc:
    image: ghcr.io/iamseth/oracledb_exporter:0.6.0
    container_name: radar-exporter-wdc
    networks: [radar]
    command: ["--custom.metrics", "/metrics/custom-metrics.toml"]
    environment:
      DATA_SOURCE_NAME: oracle://monitor:monitor@oracle-wdc:1521/FREEPDB1
    volumes:
      - ../oracle/custom-metrics.toml:/metrics/custom-metrics.toml:ro
    ports:
      - "9161:9161"
    depends_on:
      oracle-wdc:
        condition: service_started
    restart: unless-stopped

  exporter-cdc:
    image: ghcr.io/iamseth/oracledb_exporter:0.6.0
    container_name: radar-exporter-cdc
    networks: [radar]
    command: ["--custom.metrics", "/metrics/custom-metrics-cdc.toml"]
    environment:
      DATA_SOURCE_NAME: oracle://monitor:monitor@oracle-wdc:1521/FREEPDB1
    volumes:
      - ../oracle/custom-metrics-cdc.toml:/metrics/custom-metrics-cdc.toml:ro
    ports:
      - "9162:9161"
    depends_on:
      oracle-wdc:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: radar-prometheus
    networks: [radar]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.6.1
    container_name: radar-alloy
    networks: [radar]
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      - prometheus
      - exporter-wdc
      - exporter-cdc
    restart: unless-stopped

volumes:
  oracle-wdc-volume:
  prometheus-data:
  alloy-data:
