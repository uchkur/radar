<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" width="100%" height="100%">
  <defs>
    <!-- Primary DB cylinder gradient -->
    <linearGradient id="primaryCylTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a7f3d0"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <linearGradient id="primaryCylBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="50%" style="stop-color:#99f6e4"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
    <!-- Standby DB cylinder gradient -->
    <linearGradient id="standbyCylTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="standbyCylBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#bae6fd"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#0ea5e9"/>
    </marker>
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <!-- Path for flow animation (horizontal line between DBs) -->
    <path id="replicationPath" d="M 175 110 L 345 110"/>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- ========== PRIMARY DATABASE (cylinder) ========== -->
  <g filter="url(#shadow)" transform="translate(50, 35)">
    <!-- Cylinder body -->
    <path d="M 35 25 L 35 95 A 35 12 0 0 0 105 95 L 105 25 Z" fill="url(#primaryCylBody)" stroke="#059669" stroke-width="2"/>
    <!-- Cylinder top (ellipse cap) -->
    <ellipse cx="70" cy="25" rx="35" ry="12" fill="url(#primaryCylTop)" stroke="#059669" stroke-width="2"/>
    <!-- Horizontal "disc" lines on body (database look) -->
    <ellipse cx="70" cy="48" rx="32" ry="4" fill="none" stroke="#047857" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="70" cy="72" rx="32" ry="4" fill="none" stroke="#047857" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="70" cy="96" rx="32" ry="4" fill="none" stroke="#047857" stroke-width="1.2" opacity="0.5"/>
  </g>
  <text x="110" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#065f46">PRIMARY</text>
  <text x="110" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#047857">DC1</text>
  <text x="110" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6b7280">Oracle 19c</text>

  <!-- ========== REPLICATION FLOW (arrow + moving stream) ========== -->
  <!-- Main arrow line -->
  <path id="arrowLine" d="M 175 110 L 345 110" stroke="#cbd5e1" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 175 110 L 345 110" stroke="url(#arrowGrad)" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <!-- Animated dashed "stream" (flow effect) – ends before arrowhead -->
  <path id="flowDashes" d="M 175 110 L 332 110" stroke="#0ea5e9" stroke-width="2" fill="none" stroke-dasharray="8 16" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <!-- Moving dots (data packets) – path ends at start of arrowhead -->
  <circle r="5" fill="#059669">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 175 110 L 332 110"/>
  </circle>
  <circle r="4" fill="#0ea5e9">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 175 110 L 332 110" begin="0.5s"/>
  </circle>
  <circle r="4" fill="#0ea5e9">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 175 110 L 332 110" begin="1s"/>
  </circle>
  <text x="260" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Data Guard (replication)</text>

  <!-- ========== STANDBY DATABASE (cylinder) ========== -->
  <g filter="url(#shadow)" transform="translate(360, 35)">
    <!-- Cylinder body -->
    <path d="M 35 25 L 35 95 A 35 12 0 0 0 105 95 L 105 25 Z" fill="url(#standbyCylBody)" stroke="#0284c7" stroke-width="2"/>
    <!-- Cylinder top -->
    <ellipse cx="70" cy="25" rx="35" ry="12" fill="url(#standbyCylTop)" stroke="#0284c7" stroke-width="2"/>
    <!-- Disc lines -->
    <ellipse cx="70" cy="48" rx="32" ry="4" fill="none" stroke="#0369a1" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="70" cy="72" rx="32" ry="4" fill="none" stroke="#0369a1" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="70" cy="96" rx="32" ry="4" fill="none" stroke="#0369a1" stroke-width="1.2" opacity="0.5"/>
  </g>
  <text x="410" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#075985">STANDBY</text>
  <text x="410" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0369a1">DC2</text>
  <text x="410" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6b7280">Oracle 19c</text>
</svg>
