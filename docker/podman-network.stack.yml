# Полный стек Radar в одной Podman-сети (macOS / Linux).
# Oracle WDC/CDC и мониторинг общаются по DNS-именам контейнеров в сети radar.
#
# Запуск: podman compose -f docker/podman-network.stack.yml up -d
# Остановка: podman compose -f docker/podman-network.stack.yml down

networks:
  radar:
    driver: bridge

x-oracle: &oracle
  image: gvenzl/oracle-xe:11-slim-faststart   # без распаковки datafiles — быстрее на M2/Rosetta
  platform: linux/amd64
  shm_size: "2gb"
  cpus: 2
  mem_limit: 3g
  environment:
    ORACLE_PASSWORD: test
  healthcheck:
    test: ["CMD", "healthcheck.sh"]
    interval: 15s
    timeout: 60s
    retries: 40
    start_period: 1200s   # M2: первая инициализация до ~20 мин — не считать fail раньше

services:
  oracle-wdc:
    <<: *oracle
    container_name: oracle-wdc
    networks: [radar]
    ports:
      - "1521:1521"
    volumes:
      - oracle-wdc-volume:/u01/app/oracle/oradata
    restart: unless-stopped

  oracle-cdc:
    <<: *oracle
    container_name: oracle-cdc
    networks: [radar]
    ports:
      - "1522:1521"
    volumes:
      - oracle-cdc-volume:/u01/app/oracle/oradata
    depends_on:
      oracle-wdc:
        condition: service_healthy
    restart: unless-stopped

  # Экспортеры стартуют после запуска контейнера Oracle (не ждут healthy — иначе весь стек «waiting»)
  exporter-wdc:
    image: ghcr.io/iamseth/oracledb_exporter:0.6.0
    container_name: radar-exporter-wdc
    networks: [radar]
    command: ["--custom.metrics", "/metrics/custom-metrics.toml"]
    environment:
      DATA_SOURCE_NAME: oracle://monitor:monitor@oracle-wdc:1521/XE
    volumes:
      - ../oracle/custom-metrics.toml:/metrics/custom-metrics.toml:ro
    ports:
      - "9161:9161"
    depends_on:
      oracle-wdc:
        condition: service_started
    restart: unless-stopped

  exporter-cdc:
    image: ghcr.io/iamseth/oracledb_exporter:0.6.0
    container_name: radar-exporter-cdc
    networks: [radar]
    command: ["--custom.metrics", "/metrics/custom-metrics.toml"]
    environment:
      DATA_SOURCE_NAME: oracle://monitor:monitor@oracle-cdc:1521/XE
    volumes:
      - ../oracle/custom-metrics-cdc.toml:/metrics/custom-metrics.toml:ro
    ports:
      - "9162:9161"
    depends_on:
      oracle-cdc:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: radar-prometheus
    networks: [radar]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.6.1
    container_name: radar-alloy
    networks: [radar]
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      - prometheus
      - exporter-wdc
      - exporter-cdc
    restart: unless-stopped

volumes:
  oracle-wdc-volume:
  oracle-cdc-volume:
  prometheus-data:
  alloy-data:
